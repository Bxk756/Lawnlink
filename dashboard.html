<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LawnLink Dashboard</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #1db954;
      color: white;
      padding: 20px;
      font-size: 24px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #1db954;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  LawnLink Dashboard
  <span onclick="logout()">Logout</span>
</header>

<div class="container">

  <div class="card">
    <h2>Create Job</h2>

    <input id="title" placeholder="Job title" />
    <input id="price" type="number" placeholder="Price" />
    <input type="file" id="image" />

    <button onclick="createJob()">Post Job</button>

    <p id="status"></p>
    <img id="preview" />
  </div>

</div>

<script>
  // ✅ Supabase client
  const supabase = window.supabase.createClient(
    "https://zapztkpavvtslvmjzxbh.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphcHp0a3BhdnZ0c2x2bWp6eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjg2MzQsImV4cCI6MjA4OTAwNDYzNH0.81y2QP0GKLQJBkgjZkrjEhfEV_2OhJxaxpK1NfwDHRg"
  )

  let userLat = null
  let userLng = null

  // 📍 Get location
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      userLat = pos.coords.latitude
      userLng = pos.coords.longitude
      console.log("Location:", userLat, userLng)
    },
    () => {
      alert("Location required to post job")
    }
  )

  // 📸 Image preview
  document.getElementById("image").addEventListener("change", (e) => {
    const file = e.target.files[0]
    if (file) {
      document.getElementById("preview").src = URL.createObjectURL(file)
    }
  })

  // 🚀 CREATE JOB
  async function createJob() {

    const title = document.getElementById("title").value
    const price = parseFloat(document.getElementById("price").value)
    const file = document.getElementById("image").files[0]

    // ✅ Validation
    if (!title || !price) {
      alert("Enter title and price")
      return
    }

    if (!userLat || !userLng) {
      alert("Waiting for location...")
      return
    }

    let imageUrl = null

    // 📤 Upload image
    if (file) {
      const fileName = Date.now() + "-" + file.name

      const { error } = await supabase.storage
        .from("job-images")
        .upload(fileName, file)

      if (error) {
        console.log(error)
        alert("Image upload failed")
        return
      }

      const { data } = supabase.storage
        .from("job-images")
        .getPublicUrl(fileName)

      imageUrl = data.publicUrl
    }

    // 📡 SEND TO YOUR LIVE API (FIXED)
    try {
      const res = await fetch("https://api.lawnlink.cloud/api/jobs", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title,
          price,
          lat: userLat,
          lng: userLng,
          image: imageUrl
        })
      })

      const data = await res.json()
      console.log("API RESPONSE:", data)

      if (data.error) {
        document.getElementById("status").innerText = data.error
      } else {
        document.getElementById("status").innerText = "✅ Job posted!"

        // reset form
        document.getElementById("title").value = ""
        document.getElementById("price").value = ""
        document.getElementById("image").value = ""
        document.getElementById("preview").src = ""
      }

    } catch (err) {
      console.log("ERROR:", err)
      alert("API failed — check console")
    }
  }

  function logout() {
    window.location.href = "/login.html"
  }
</script>

</body>
</html>
