<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LawnLink Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: Arial; background: #f5f5f5; }
    header {
      background: #1db954;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
    }
    .container { padding: 20px; }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }
    button {
      background: #1db954;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<header>
  LawnLink Dashboard
  <span onclick="logout()">Logout</span>
</header>

<div class="container">
  <div class="card">
    <h2>Create Job</h2>

    <input id="title" placeholder="Job title" />
    <input id="price" type="number" placeholder="Price" />
    <input type="file" id="image" />

    <button onclick="createJob()">Post Job</button>

    <p id="status"></p>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://zapztkpavvtslvmjzxbh.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphcHp0a3BhdnZ0c2x2bWp6eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjg2MzQsImV4cCI6MjA4OTAwNDYzNH0.81y2QP0GKLQJBkgjZkrjEhfEV_2OhJxaxpK1NfwDHRg"
)

let userLat = null
let userLng = null

navigator.geolocation.getCurrentPosition(
  (pos) => {
    userLat = pos.coords.latitude
    userLng = pos.coords.longitude
  }
)

async function createJob() {
  console.log("CLICKED")

  const title = document.getElementById("title").value
  const price = parseFloat(document.getElementById("price").value)
  const file = document.getElementById("image").files[0]

  if (!title || !price) {
    alert("Enter title and price")
    return
  }

  let imageUrl = null

  if (file) {
    const fileName = Date.now() + "-" + file.name

    const { error } = await supabase.storage
      .from("job-images")
      .upload(fileName, file)

    if (error) {
      console.log(error)
      alert("Upload failed")
      return
    }

    const { data } = supabase.storage
      .from("job-images")
      .getPublicUrl(fileName)

    imageUrl = data.publicUrl
  }

  const res = await fetch("/api/jobs", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title,
      price,
      lat: userLat,
      lng: userLng,
      image: imageUrl
    })
  })

  const data = await res.json()

  if (data.error) {
    document.getElementById("status").innerText = data.error
  } else {
    document.getElementById("status").innerText = "✅ Posted!"
  }
}

function logout() {
  window.location.href = "/login.html"
}
</script>

</body>
</html>
