<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LawnLink Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #1db954;
      color: white;
      padding: 20px;
      font-size: 24px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #1db954;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  LawnLink Dashboard
  <span onclick="logout()">Logout</span>
</header>

<div class="container">
  <div class="card">
    <h2>Create Job</h2>

    <input id="title" placeholder="Job title" />
    <input id="price" type="number" placeholder="Price" />
    <input type="file" id="image" />

    <button id="submitBtn" onclick="createJob()">Post Job</button>

    <p id="status"></p>
    <img id="preview" />
  </div>
</div>

<script>
  // ✅ YOUR REAL SUPABASE CONNECTION (WORKING)
  const supabase = window.supabase.createClient(
    "https://zapztkpavvtslvmjzxbh.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphcHp0a3BhdnZ0c2x2bWp6eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjg2MzQsImV4cCI6MjA4OTAwNDYzNH0.81y2QP0GKLQJBkgjZkrjEhfEV_2OhJxaxpK1NfwDHRg"
  );

  let userLat = null;
  let userLng = null;

  // 📍 LOCATION
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      console.log("Location:", userLat, userLng);
    },
    () => alert("Location required")
  );

  // 📸 PREVIEW
  document.getElementById("image").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) {
      document.getElementById("preview").src = URL.createObjectURL(file);
    }
  });

  async function createJob() {
    const btn = document.getElementById("submitBtn");
    const status = document.getElementById("status");

    const title = document.getElementById("title").value;
    const price = parseFloat(document.getElementById("price").value);
    const file = document.getElementById("image").files[0];

    btn.disabled = true;
    status.innerText = "Posting...";

    // VALIDATION
    if (!title || !price) {
      alert("Enter title + price");
      btn.disabled = false;
      return;
    }

    if (!userLat || !userLng) {
      alert("Waiting for location...");
      btn.disabled = false;
      return;
    }

    let imageUrl = null;

    // 📤 UPLOAD IMAGE
    if (file) {
      const fileName = `${Date.now()}-${Math.random()}-${file.name}`;

      const { error } = await supabase.storage
        .from("job-images")
        .upload(fileName, file);

      if (error) {
        alert("Upload failed");
        console.log(error);
        btn.disabled = false;
        return;
      }

      const { data } = supabase.storage
        .from("job-images")
        .getPublicUrl(fileName);

      imageUrl = data.publicUrl;
      console.log("Image URL:", imageUrl);
    }

    // 📡 SEND TO API
    const res = await fetch("/api/jobs", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        title,
        price,
        lat: userLat,
        lng: userLng,
        image: imageUrl
      })
    });

    const data = await res.json();

    if (data.error) {
      status.innerText = data.error;
    } else {
      status.innerText = "✅ Job posted!";
    }

    btn.disabled = false;
  }

  function logout() {
    window.location.href = "/login.html";
  }
</script>

</body>
</html>
