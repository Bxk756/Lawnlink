<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LawnLink Sign Up</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:system-ui;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:16px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
}

.logo{
width:60px;
height:60px;
background:#1a9b6b;
border-radius:16px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:28px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
background:#1a9b6b;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">🌿</div>

<h2>Create LawnLink Account</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<p>Already have an account?</p>

<a href="/login.html">Login</a>

</div>

<script>

const SUPABASE_URL="https://zapztkpavvtslvmjzxbh.supabase.co"

const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphcHp0a3BhdnZ0c2x2bWp6eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjg2MzQsImV4cCI6MjA4OTAwNDYzNH0.81y2QP0GKLQJBkgjZkrjEhfEV_2OhJxaxpK1NfwDHRg"

const { createClient } = supabase

const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

async function signup(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const { error } = await client.auth.signUp({
email:email,
password:password
})

if(error){
alert(error.message)
return
}

alert("Account created!")

window.location.href="/login.html"

}

</script>

</body>
</html>
