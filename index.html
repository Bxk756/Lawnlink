<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LawnLink</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
}

.service{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
background:#22c55e;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>LawnLink</h1>

<h3>On-Demand Landscaping</h3>

<div class="service">

<h2>Front Yard Mowing</h2>

<p>$45</p>

<button onclick="pay('Front Yard Mowing',45)">
Pay with Stripe
</button>

</div>

<div class="service">

<h2>Backyard Landscaping</h2>

<p>$120</p>

<button onclick="pay('Backyard Landscaping',120)">
Pay with Stripe
</button>

</div>

<div class="service">

<h2>Weed Removal</h2>

<p>$60</p>

<button onclick="pay('Weed Removal',60)">
Pay with Stripe
</button>

</div>

</div>

<script>

async function pay(title,price){

const response = await fetch("https://api.lawnlink.cloud/api/create-checkout-session",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
title:title,
price:price
})

})

const data = await response.json()

window.location = data.url

}

</script>

</body>
</html>
