<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LawnLink</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://js.stripe.com/v3/"></script>

<style>

body{
font-family:system-ui;
}

</style>

</head>

<body class="bg-zinc-900 text-white">

<div class="max-w-md mx-auto min-h-screen bg-white text-black">

<!-- NAVBAR -->

<div class="bg-emerald-600 text-white p-4 flex justify-between">

<div class="text-xl font-bold">
🌿 LawnLink
</div>

</div>

<!-- JOB LIST -->

<div id="jobs" class="p-4 space-y-4"></div>

</div>

<script>

const stripe = Stripe("pk_live_51S7jIwPtQvLCZahFDK8P87lrae9yTITPby52qW1VH7HTUD1iPyvvk0WrhSuUEf24xLiwi9110LDjQ8hcs33xQxai00ytyGFKcg")

let jobs = [

{
id:1,
title:"Front Yard Mowing",
price:45
},

{
id:2,
title:"Backyard Landscaping",
price:120
}

]

function renderJobs(){

const container = document.getElementById("jobs")

container.innerHTML = ""

jobs.forEach(job=>{

const card = document.createElement("div")

card.className="p-4 border rounded-xl"

card.innerHTML=`

<div class="text-lg font-semibold">${job.title}</div>

<div class="text-emerald-600 font-bold">$${job.price}</div>

<button
onclick="pay(${job.id})"
class="mt-3 w-full bg-emerald-600 text-white p-2 rounded-lg">

Pay with Stripe

</button>

`

container.appendChild(card)

})

}

async function pay(jobId){

const job = jobs.find(j=>j.id===jobId)

const response = await fetch(
"https://api.lawnlink.cloud/api/create-checkout-session",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
jobId:job.id,
amount:job.price*100
})
}
)

const data = await response.json()

window.location.href=data.url

}

renderJobs()

</script>

</body>

</html>
