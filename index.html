<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LawnLink</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
color:#222;
}

header{
background:#2e8b57;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.hero{
text-align:center;
margin-bottom:40px;
}

.hero h2{
font-size:36px;
margin-bottom:10px;
}

.hero p{
color:#666;
}

.services{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.card h3{
margin-top:0;
}

.price{
font-size:20px;
font-weight:bold;
margin:10px 0;
}

button{
background:#22c55e;
border:none;
color:white;
padding:12px 20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>

</head>

<body>

<header>

<h1>LawnLink</h1>

<div>☰</div>

</header>


<div class="container">

<div class="hero">

<h2>On-Demand Landscaping Services in Minutes</h2>

<p>Connect with local landscapers instantly. No waiting weeks for quotes.</p>

</div>


<div class="services">

<div class="card">

<h3>Front Yard Mowing</h3>

<div class="price">$45</div>

<button onclick="pay('Front Yard Mowing',45)">
Pay with Stripe
</button>

</div>


<div class="card">

<h3>Backyard Landscaping</h3>

<div class="price">$120</div>

<button onclick="pay('Backyard Landscaping',120)">
Pay with Stripe
</button>

</div>


<div class="card">

<h3>Weed Removal</h3>

<div class="price">$60</div>

<button onclick="pay('Weed Removal',60)">
Pay with Stripe
</button>

</div>


<div class="card">

<h3>Full Lawn Cleanup</h3>

<div class="price">$150</div>

<button onclick="pay('Full Lawn Cleanup',150)">
Pay with Stripe
</button>

</div>

</div>

</div>


<script>

async function pay(title,price){

const response = await fetch("https://api.lawnlink.cloud/api/create-checkout-session",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
title:title,
price:price
})

})

const data = await response.json()

window.location = data.url

}

</script>


</body>
</html>
