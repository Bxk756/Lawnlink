<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LawnLink Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: system-ui;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:16px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
}

.logo{
width:60px;
height:60px;
background:#1a9b6b;
border-radius:16px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:26px;
}

h1{
margin-top:16px;
}

.subtitle{
color:#777;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
background:#1a9b6b;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.footer{
margin-top:20px;
font-size:14px;
color:#666;
}

</style>

</head>

<body>

<div class="card">

<a href="signup.html">Create one</a>
</div>

</div>

<script>

const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphcHp0a3BhdnZ0c2x2bWp6eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjg2MzQsImV4cCI6MjA4OTAwNDYzNH0.81y2QP0GKLQJBkgjZkrjEhfEV_2OhJxaxpK1NfwDHRg"
