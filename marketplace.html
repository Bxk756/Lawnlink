<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LawnLink Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#f5f5f5;
}

header{
background:#16a34a;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.job{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

button{
margin-top:10px;
padding:10px 14px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>Job Marketplace</h2>

<button onclick="logout()">Logout</button>

</header>

<div class="container">

<div id="jobs"></div>

</div>

<script>

async function loadJobs(){

const { data } = await client
.from("jobs")
.select("*")
.order("created_at",{ascending:false})

const container=document.getElementById("jobs")

container.innerHTML=""

data.forEach(job=>{

const div=document.createElement("div")

div.className="job"

div.innerHTML=`

<h3>${job.title}</h3>

<p>$${job.price}</p>

<p>Status: ${job.status}</p>

<button onclick="acceptJob('${job.id}')">
Accept Job
</button>

`

container.appendChild(div)

})

}

async function acceptJob(jobId){

const { data:{ user } } = await client.auth.getUser()

await client
.from("jobs")
.update({
landscaper_id:user.id,
status:"accepted"
})
.eq("id",jobId)

loadJobs()

}

async function logout(){

await client.auth.signOut()

window.location="/login.html"

}

loadJobs()

</script>

</body>
</html>
