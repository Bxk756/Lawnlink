<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LawnLink Marketplace</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #1db954;
      color: white;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }

    .container {
      padding: 20px;
    }

    #map {
      height: 300px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .job {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      background: #1db954;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  Job Marketplace
  <span>Logout</span>
</header>

<div class="container">
  <div id="map"></div>
  <div id="jobs"></div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script>
mapboxgl.accessToken = "pk.eyJ1IjoiYnhrNzU3IiwiYSI6ImNtbnFzZzhzMzBhYWgyc3EzaWRteHgzanMifQ.0SxZfEeRvKHEuSxnF4dq9A";

const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/streets-v11",
  center: [-76.0515, 36.8529],
  zoom: 12
});

let markers = [];

map.on("load", () => {
  loadJobs();
});

async function loadJobs() {
  const res = await fetch("/api/jobs");
  const jobs = await res.json();

  const container = document.getElementById("jobs");
  container.innerHTML = "";

  markers.forEach(m => m.remove());
  markers = [];

  jobs.forEach(job => {

    const div = document.createElement("div");
    div.className = "job";

    div.innerHTML = `
      <h3>${job.title}</h3>
      <p>$${job.price}</p>
      <button onclick="acceptJob(${job.id})">Accept Job</button>
    `;

    container.appendChild(div);

    if (job.lat && job.lng) {
      const marker = new mapboxgl.Marker()
        .setLngLat([job.lng, job.lat])
        .addTo(map);

      markers.push(marker);
    }
  });
}

async function acceptJob(jobId) {
  await fetch("/api/accept-job", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ jobId, landscaperId: 1 })
  });

  alert("Job accepted!");
  loadJobs();
}
</script>

</body>
</html>
